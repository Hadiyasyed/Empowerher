<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <style>
    .profile-card {
      width: 300px;
      height: 400px;
      padding: 20px;
      margin: auto;
      border: 2px solid black;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fff;
    }
    .profile-image {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 24px;
      border: 3px solid #eee;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }
    .profile-name {
      margin: 0;
      margin-bottom: 10px;
      font-size: 1.6em;
    }
    .profile-desc {
      margin: 0;
      color: #666;
      font-size: 1em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img class="profile-image" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIboqgzHXB2hL-dJPrThplMrfGcSE5GeeS9g&s" alt="Profile Photo">
    <h2 class="profile-name">Hadiya</h2>
    <p class="profile-desc">A passionate JavaScript learner and aspiring developer.</p>
  </div>
</body>
</html>

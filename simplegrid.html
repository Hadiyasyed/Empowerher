<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple 3x3 Grid Layout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      margin: 0;
      padding: 20px;
    }
    .container {
      width: 90vw;
      max-width: 1100px;
      margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }
    .grid div {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      color: #fff;
      font-weight: 500;
      height: 180px;
      border-radius: 4px;
    }
    .item1 { background: #00c6ff; }   /* Light blue */
    .item2 { background: #fd4700; }   /* Orange-red */
    .item3 { background: #4987ed; }   /* Blue */
    .item4 { background: #ffe100; color: #fff; }   /* Yellow */
    .item5 { background: #9f36e3; }   /* Purple */
    .item6 { background: #4fd156; }   /* Green */
    .item7 { background: #ff855e; }   /* Peach */
    .item8 { background: #2dbbb8; }   /* Teal */
    .item9 { background: #83080b; }   /* Burgundy */
  </style>
</head>
<body>
  <div class="container">
    <h2>Create a simple grid layout based on the image below!</h2>
    <div class="grid">
      <div class="item2">2.</div>
      <div class="item3">3.</div>
      <div class="item4">4.</div>
      <div class="item5">5.</div>
      <div class="item6">6.</div>
      <div class="item1">1.</div>
      <div class="item7">7.</div>
      <div class="item8">8.</div>
      <div class="item9">9.</div>
    </div>
  </div>
</body>
</html>

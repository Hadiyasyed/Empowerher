<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Assignment</title>
</head>
<body>
    <h1 id="main-heading">Original Heading</h1>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
    <p>Paragraph 3</p>
    <div class="container">
        This is a container div.
    </div>
    <script>
        document.getElementById('main-heading').textContent = "Welcome to the DOM World!";
        let paragraphs = document.getElementsByTagName('p');
        for (let p of paragraphs) {
            p.style.color = 'blue';
        }
        document.querySelector('.container').style.backgroundColor = 'yellow';
    </script>
</body>
</html>

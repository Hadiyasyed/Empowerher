<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Showcase Card</title>
  <style>
    body {
      background: #f8f9fa;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin-top: 30px;
    }
    .product-card {
      width: 500px;
      height: 600px;
      background: #fff;
      border: 3px solid grey;
      border-radius: 22px;
      padding: 30px;
      margin: 10px;
      box-shadow: 0 6px 24px rgba(44,43,94,0.17);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .product-image {
      width: 100%;
      height: 260px;
      object-fit: contain;
      border-radius: 14px;
      margin-bottom: 22px;
      background: #f8fafc;
    }
    .product-title {
      font-size: 1.33em;
      font-weight: 600;
      margin: 0 0 5px 0;
      text-align: left;
      width: 100%;
    }
    .product-desc {
      font-size: 1em;
      color: #7a7a7a;
      margin-bottom: 16px;
      width: 100%;
      text-align: left;
    }
    .product-rating {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      width: 100%;
    }
    .product-rating .rating-badge {
      background: #388e3c;
      color: #fff;
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 1em;
      font-weight: bold;
      margin-right: 4px;
      display: flex;
      align-items: center;
    }
    .product-rating .rating-count {
      color: #8f8f8f;
      font-weight: 500;
      margin-right: 8px;
      font-size: 1em;
    }
    .product-rating .assured-logo {
      height: 23px;
      margin-left: 8px;
    }
    .product-pricing {
      width: 100%;
      margin-bottom: 5px;
      display: flex;
      align-items: flex-end;
      gap: 9px;
    }
    .price {
      font-size: 2em;
      color: #212121;
      font-weight: 600;
    }
    .price-strikethrough {
      text-decoration: line-through;
      color: #979797;
      font-size: 1.1em;
    }
    .price-off {
      color: #1bae5a;
      font-size: 1.08em;
      font-weight: 500;
    }
    .product-offer {
      color: #1bae5a;
      font-size: 1.03em;
      font-weight: 500;
      margin-bottom: 13px;
      width: 100%;
      text-align: left;
      letter-spacing: 0.4px;
    }
    .buy-now-btn {
      margin-top: 18px;
      padding: 13px 38px;
      font-size: 1.18em;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #2636f7;
      color: #fff;
      cursor: pointer;
      transition: background 0.23s;
      box-shadow: 0 2px 10px rgba(36,54,247,0.09);
    }
    .buy-now-btn:hover {
      background: #0212a2;
    }
  </style>
</head>
<body>
  <div class="product-card">
    <img class="product-image" src="https://rukminim2.flixcart.com/image/612/612/xif0q/smartwatch/w/x/h/-original-imahfa7xspmxemvj.jpeg" alt="Samsung Galaxy Watch6 LTE">
    <div class="product-title">SAMSUNG Galaxy Watch6 LTE</div>
    <div class="product-desc">Graphite Strap, 44mm</div>
    <div class="product-rating">
      <span class="rating-badge">4.3 ★</span>
      <span class="rating-count">(973)</span>
      <img class="assured-logo" src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/fa_62673a.png" alt="Flipkart Assured">
    </div>
    <div class="product-pricing">
      <span class="price">₹18,999</span>
      <span class="price-strikethrough">₹41,999</span>
      <span class="price-off">54% off</span>
    </div>
    <div class="product-offer">Bank Offer</div>
    <button class="buy-now-btn">Buy Now</button>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grand Launch Invitation</title>
  <style>
    body {
      background: #f6f8fa;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .invitation-card {
      background: #fffbe6;
      padding: 32px 40px;
      margin: 60px auto;
      width: 400px;
      border: 3px solid #2962ff;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(44, 80, 180, 0.12);
      text-align: center;
    }

    .invitation-logo {
      width: 300px;
      display: block;
      margin: 0 auto 20px auto;
    }

    .invitation-title {
      font-family: 'Montserrat', Arial, sans-serif;
      color: #08306b;
      font-size: 2em;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .event-details {
      font-size: 1.1em;
      color: #1a3c73;
      margin-bottom: 24px;
    }

    .description {
      color: #444e5e;
      font-style: italic;
      margin-bottom: 22px;
    }

    .join-btn {
      display: inline-block;
      background: #2962ff;
      color: #fffbe6;
      font-family: 'Montserrat', Arial, sans-serif;
      padding: 12px 34px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      margin-top: 24px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .join-btn:hover {
      background: #011f4b;
      color: #ffd600;
    }
  </style>
</head>
<body>
  <div class="invitation-card">
    <!-- Logo or Representative Image -->
    <img 
      src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" 
      alt="Company Logo"
      class="invitation-logo" />

    <!-- Welcoming Heading -->
    <h2 class="invitation-title">You're Invited to Our Grand Launch!</h2>
    
    <!-- Event Details -->
    <p class="event-details">
      <strong>Date:</strong> December 15, 2025<br>
      <strong>Time:</strong> 6:00 PM onwards<br>
      <strong>Venue:</strong> Cloud Nine Conference Hall, Main City
    </p>
    
    <!-- (Optional) Company Description -->
    <div class="description">
      Join us as we unveil our new vision—innovating for a brighter, connected tomorrow!
    </div>

    <!-- Join Now Button -->
    <button class="join-btn">Join Now!</button>
  </div>
</body>
</html>
